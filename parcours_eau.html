<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Parcours & Points d'Eau</title>
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Parcours Eau">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2333;
      --border: #30363d;
      --blue: #2ea8e0;
      --blue-light: #79c0ff;
      --water: #58a6ff;
      --track: #f78166;
      --green: #56d364;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #f0883e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-title .icon {
      font-size: 1.4rem;
    }

    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-value {
      font-family: 'Fira Mono', monospace;
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat.blue .stat-value { color: var(--water); }
    .stat.red .stat-value { color: var(--track); }
    .stat.green .stat-value { color: var(--green); }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .filter-group label {
      font-weight: 600;
      color: var(--text);
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--water);
      cursor: pointer;
    }

    .range-val {
      font-family: 'Fira Mono', monospace;
      font-size: 0.75rem;
      color: var(--water);
      min-width: 40px;
    }

    .btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { background: var(--border); }
    .btn.active { background: var(--water); color: #000; border-color: var(--water); }

    .layer-selector {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .layer-btn { font-size: 0.7rem; padding: 4px 9px; }
    .layer-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    #map {
      flex: 1;
      width: 100%;
    }

    /* Leaflet dark theme overrides */
    .leaflet-container {
      background: #0d1117;
    }

    .leaflet-popup-content-wrapper {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      font-family: 'Raleway', sans-serif;
    }

    .leaflet-popup-tip {
      background: var(--surface);
    }

    .leaflet-popup-close-button {
      color: var(--muted) !important;
    }

    .popup-inner {
      min-width: 160px;
    }

    .popup-inner h3 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--water);
      margin-bottom: 4px;
    }

    .popup-inner .dept {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .popup-inner .dist-badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'Fira Mono', monospace;
      font-size: 0.72rem;
      color: var(--green);
    }

    .popup-inner .operator {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
      font-style: italic;
    }

    .popup-inner .gmaps-link {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--blue-light);
      font-size: 0.72rem;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.15s;
    }

    .popup-inner .gmaps-link:hover {
      background: var(--border);
      color: #fff;
    }

    .legend {
      position: absolute;
      bottom: 30px;
      left: 12px;
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.72rem;
      line-height: 1.8;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .legend-line {
      width: 24px;
      height: 3px;
      border-radius: 2px;
      background: var(--track);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--water);
      border: 2px solid rgba(88,166,255,0.4);
      flex-shrink: 0;
    }

    .legend-dot-me {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #56d364;
      border: 2px solid rgba(86,211,100,0.4);
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(86,211,100,0.6); }
      70%  { box-shadow: 0 0 0 10px rgba(86,211,100,0); }
      100% { box-shadow: 0 0 0 0 rgba(86,211,100,0); }
    }

    nav {
      display: flex;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 4px;
      gap: 5px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Raleway', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      min-height: 72px;
    }

    .nav-btn .nav-icon { font-size: 1.7rem; }
    .nav-btn.active { color: var(--water); border-top: 3px solid var(--water); }
    .nav-btn:hover { color: var(--text); }

    .version {
      position: absolute;
      bottom: calc(72px + env(safe-area-inset-bottom, 0px) + 6px);
      right: 10px;
      z-index: 999;
      font-family: 'Fira Mono', monospace;
      font-size: 0.6rem;
      color: var(--border);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <span class="icon">🗺️</span>
      <h1>Parcours &amp; Points d'Eau</h1>
    </div>
    <div class="stats">
      <div class="stat blue">

        <button class="btn layer-btn" data-layer="cyclosm">🚴 CyclOSM</button>
      </div>
    </div>
  </header>

  <div id="map"></div>

  </div>

        if (key === currentLayerKey) return;
        map.removeLayer(LAYERS[currentLayerKey]);
        LAYERS[key].addTo(map);
        currentLayerKey = key;
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    const trackCoords = TRACK.map(p => [p[0], p[1]]);

      color: '#ff1a1a',
      weight: 3,
      opacity: 1,
      smoothFactor: 1.5
    }).addTo(map);

    // Water point icon
    function makeIcon(dist) {
      const intensity = 1 - (dist / 800);
      const size = Math.round(8 + intensity * 6);
      return L.divIcon({
        className: '',
        html: `<div style="
          width: ${size}px; height: ${size}px;
          border-radius: 50%;
          background: rgba(88,166,255,0.85);
          border: 2px solid rgba(88,166,255,0.3);
          box-shadow: 0 0 ${Math.round(intensity*10)}px rgba(88,166,255,0.6);
        "></div>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
      });
    }

    let waterMarkers = [];
    let markerLayer = L.layerGroup().addTo(map);

    function renderWater(maxDist) {
      markerLayer.clearLayers();
      waterMarkers = [];
      const filtered = WATER.filter(w => w.dist <= maxDist);
      document.getElementById('count-water').textContent = filtered.length.toLocaleString('fr-FR');

      filtered.forEach(w => {
        const m = L.marker([w.lat, w.lon], { icon: makeIcon(w.dist) });
        const commune = w.commune || 'Inconnu';
        const dept = w.departement || '';
        const op = w.operator ? `<div class="operator">${w.operator}</div>` : '';
        const gmapsUrl = `https://www.google.com/maps?q=${w.lat},${w.lon}&z=17`;
        m.bindPopup(`
          <div class="popup-inner">
            <h3>💧 ${commune}</h3>
            <div class="dept">${dept}</div>
            <span class="dist-badge">à ${w.dist} m du tracé</span>
            ${op}
            <a class="gmaps-link" href="${gmapsUrl}" target="_blank" rel="noopener">📍 Ouvrir dans Google Maps</a>
          </div>
        `, { maxWidth: 240 });
        markerLayer.addLayer(m);
        waterMarkers.push(m);
      });
    }

            weight: 1
          }).addTo(map);

          meMarker = L.marker([lat, lon], { icon: meIcon, zIndexOffset: 2000 })
            .bindPopup(`
              <div class="popup-inner">
                <h3 style="color:#56d364">🟢 Ma position</h3>
                <div class="dept">${lat.toFixed(5)}, ${lon.toFixed(5)}</div>
                <div class="dept">Précision : ±${Math.round(acc)} m</div>
                <a class="gmaps-link" href="https://www.google.com/maps?q=${lat},${lon}&z=16" target="_blank" rel="noopener">📍 Ouvrir dans Google Maps</a>
              </div>
            `, { maxWidth: 220 })
            .addTo(map);

          map.setView([lat, lon], 14);
          meMarker.openPopup();
          document.getElementById('legend-me').style.display = 'flex';

          btn.textContent = '📍 Ma position';
          btn.disabled = false;
          btn.classList.add('active');
        },
        (err) => {
          alert("Impossible d'obtenir votre position : " + err.message);
          btn.textContent = '📍 Ma position';
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  </script>
