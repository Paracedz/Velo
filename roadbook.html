<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadbook Vélo — 8 Jours de Provence à Bretagne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --gold: #E8C84A;
    --gold-light: #F5DE7A;
    --dark: #0E0E12;
    --dark2: #161620;
    --dark3: #1E1E2C;
    --accent: #FF5533;
    --text: #E8E4D8;
    --muted: #8A8070;
    --green: #4CAF7D;
    --map-bg: #f0f0f0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ===== COVER ===== */
  #cover {
    height: 100vh;
    min-height: 600px;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  #cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(232,200,74,0.08) 0%, transparent 70%);
  }
  .cover-route-line {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.06;
  }
  .cover-eyebrow {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }
  .cover-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 9vw, 9rem);
    line-height: 0.9;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }
  .cover-title span { color: var(--gold); }
  .cover-subtitle {
    font-size: 1.05rem;
    color: var(--muted);
    margin-top: 28px;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.6s forwards;
  }
  .cover-stats {
    display: flex;
    gap: 48px;
    margin-top: 52px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.8s forwards;
  }
  .cover-stat { text-align: center; }
  .cover-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--gold);
    display: block;
  }
  .cover-stat-lbl {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .cover-divider {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 36px auto;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.9s forwards;
  }
  .cover-scroll {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: bounce 2s infinite;
    cursor: pointer;
  }
  .cover-scroll svg { opacity: 0.5; }

  /* ===== NAV ===== */
  #day-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,14,18,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(232,200,74,0.15);
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 52px;
    gap: 4px;
    overflow-x: auto;
  }
  #day-nav::-webkit-scrollbar { display: none; }
  .nav-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-right: 12px;
    white-space: nowrap;
  }
  .nav-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .nav-btn:hover, .nav-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 700;
  }

  /* ===== DAY PAGES ===== */
  .day-page {
    min-height: 100vh;
    padding: 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .day-header {
    background: var(--dark2);
    padding: 40px 48px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(232,200,74,0.1);
  }
  .day-number-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .day-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 6rem;
    line-height: 1;
    color: rgba(232,200,74,0.12);
    min-width: 80px;
  }
  .day-info {}
  .day-date {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    color: var(--text);
    line-height: 1.05;
  }
  .day-terrain {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }
  .day-stats-row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
  }
  .stat-chip {
    text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 12px 20px;
    min-width: 90px;
  }
  .stat-chip-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--gold);
    display: block;
    line-height: 1;
  }
  .stat-chip-lbl {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
    display: block;
  }

  /* ===== BODY GRID ===== */
  .day-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 0;
  }
  @media (max-width: 900px) {
    .day-body { grid-template-columns: 1fr; }
  }

  /* ===== MAP ===== */
  .day-map-wrap {
    position: relative;
    background: var(--map-bg);
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  .day-map {
    width: 100%;
    height: 380px;
  }

  /* ===== DESC ===== */
  .day-desc-wrap {
    padding: 32px 36px;
    background: var(--dark3);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .day-desc-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .day-desc-text {
    font-size: 0.98rem;
    line-height: 1.8;
    color: rgba(232,228,216,0.85);
    font-style: italic;
  }

  /* ===== PROFILE ===== */
  .day-profile-wrap {
    grid-column: 1 / -1;
    background: var(--dark2);
    padding: 20px 32px 8px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .profile-label {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .profile-canvas-wrap {
    position: relative;
    width: 100%;
  }
  canvas.profile-canvas {
    width: 100%;
    height: 180px;
    display: block;
  }

  /* ===== KM FRIEZE ===== */
  .day-frieze-wrap {
    grid-column: 1 / -1;
    background: var(--dark);
    padding: 16px 32px 32px;
    overflow-x: auto;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .frieze-label {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .frieze-container {
    position: relative;
    min-width: 600px;
    height: 90px;
  }
  .frieze-line {
    position: absolute;
    top: 38px;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 2px;
  }
  .frieze-km-tick {
    position: absolute;
    top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateX(-50%);
  }
  .frieze-km-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--dark);
    border: 2px solid var(--gold);
    margin-bottom: 4px;
    position: relative;
    z-index: 2;
  }
  .frieze-km-dot.start { background: var(--green); border-color: var(--green); }
  .frieze-km-dot.end { background: var(--accent); border-color: var(--accent); }
  .frieze-km-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.7rem;
    color: var(--gold);
    margin-top: 4px;
    white-space: nowrap;
  }
  .frieze-km-name {
    font-size: 0.6rem;
    color: var(--text);
    text-align: center;
    margin-top: 2px;
    white-space: nowrap;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 48px 24px;
    background: var(--dark2);
    border-top: 1px solid rgba(232,200,74,0.15);
  }
  .footer-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .footer-sub {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  .day-map .leaflet-tile-pane { filter: brightness(0.7) saturate(0.5); }
</style>
</head>

function initMap(dayNum, data) {
  const track = data.track;
  const latlngs = track.map(p => [p[0], p[1]]);

  const map = L.map(`map-${dayNum}`, {
    zoomControl: false,
    attributionControl: false,
    scrollWheelZoom: false,
    dragging: true,
    touchZoom: true,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(map);
  
  // Labels layer
//  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_only_labels/{z}/{x}/{y}{r}.png', {
//    maxZoom: 19,

  const polyline = L.polyline(latlngs, {
    color: '#E8C84A',
    weight: 3,
    opacity: 0.9,
  }).addTo(map);

  // Start marker
  L.circleMarker(latlngs[0], {
    radius: 7,
    fillColor: '#4CAF7D',
    color: '#fff',
    weight: 2,
    fillOpacity: 1,
  }).addTo(map).bindPopup(`<b>Départ</b><br>${data.waypoints[0]?.name || ''}`);

  // End marker
  const last = latlngs[latlngs.length - 1];
  L.circleMarker(last, {
    radius: 7,
    fillColor: '#FF5533',
    color: '#fff',
    weight: 2,
    fillOpacity: 1,
  }).addTo(map).bindPopup(`<b>Arrivée</b><br>${data.waypoints[data.waypoints.length - 1]?.name || ''}`);

  map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
  maps[dayNum] = map;
}

function drawProfile(dayNum, data) {

  function yOf(ele) { return PAD_T + gH - ((ele - minEle) / eleRange) * gH; }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  const steps = 4;
  for (let i = 0; i <= steps; i++) {
    const y = PAD_T + (i / steps) * gH;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    const eleVal = maxEle - (i / steps) * eleRange;
    ctx.fillStyle = 'rgba(138,128,112,0.7)';
    ctx.font = '9px Lato, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(eleVal) + 'm', PAD_L - 4, y + 3);
  }

  // Fill area
  const grad = ctx.createLinearGradient(0, PAD_T, 0, PAD_T + gH);
  grad.addColorStop(0, 'rgba(232,200,74,0.55)');
  grad.addColorStop(1, 'rgba(232,200,74,0.02)');

  ctx.beginPath();
  ctx.moveTo(xOf(profile[0][0]), yOf(profile[0][1]));
  for (let i = 1; i < profile.length; i++) {
    ctx.lineTo(xOf(profile[i][0]), yOf(profile[i][1]));
  }
  ctx.lineTo(xOf(profile[profile.length-1][0]), PAD_T + gH);
  ctx.lineTo(xOf(profile[0][0]), PAD_T + gH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xOf(profile[0][0]), yOf(profile[0][1]));
  for (let i = 1; i < profile.length; i++) {
    ctx.lineTo(xOf(profile[i][0]), yOf(profile[i][1]));
  }
  ctx.strokeStyle = '#E8C84A';
  ctx.lineWidth = 1.8;
  ctx.stroke();

  // Waypoint ticks on profile
  const wps = data.waypoints;
  for (const wp of wps) {
    const x = xOf(wp.km);
    ctx.beginPath();
    ctx.moveTo(x, PAD_T + gH);
    ctx.lineTo(x, PAD_T + gH + 5);
    ctx.strokeStyle = 'rgba(232,200,74,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // X axis km labels
  const kmStep = kmTotal > 150 ? 30 : kmTotal > 100 ? 20 : 10;
  ctx.fillStyle = 'rgba(138,128,112,0.8)';
  ctx.font = '9px Lato, sans-serif';
  ctx.textAlign = 'center';
  for (let km = 0; km <= kmTotal; km += kmStep) {
    const x = xOf(km);
    ctx.fillText(km + ' km', x, H - 4);
  }
}

function buildFrieze(dayNum, data) {
  const container = document.getElementById(`frieze-${dayNum}`);
  const wps = data.waypoints;
  const kmTotal = data.km;

  // Line
  const line = document.createElement('div');
  line.className = 'frieze-line';
  container.appendChild(line);

  wps.forEach((wp, idx) => {
    const pct = (wp.km / kmTotal) * 100;
    const tick = document.createElement('div');
    tick.className = 'frieze-km-tick';
    tick.style.left = `${pct}%`;

    const dot = document.createElement('div');
    dot.className = 'frieze-km-dot' + (idx === 0 ? ' start' : idx === wps.length-1 ? ' end' : '');

    const num = document.createElement('div');
    num.className = 'frieze-km-num';
    num.textContent = Math.round(wp.km) + ' km';

    const name = document.createElement('div');
    name.className = 'frieze-km-name';
    name.textContent = wp.name;
    name.title = wp.name;

    tick.appendChild(dot);
    tick.appendChild(num);
    tick.appendChild(name);
    container.appendChild(tick);
  });
}

function scrollToDay(n) {
  document.getElementById(`day-${n}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i+1 === n));
}

// Intersection observer for nav highlight
function setupNavHighlight() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const num = parseInt(e.target.id.replace('day-',''));
        document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i+1 === num));
      }
    });
  }, { threshold: 0.3 });
  for (let i = 1; i <= 8; i++) {
    const el = document.getElementById(`day-${i}`);
    if (el) observer.observe(el);
  }
}

// Lazy init maps when visible
function setupLazyMaps() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const dayNum = parseInt(e.target.id.replace('day-',''));
        if (!maps[dayNum]) {
          initMap(dayNum, DAYS_DATA[dayNum]);
          drawProfile(dayNum, DAYS_DATA[dayNum]);
          buildFrieze(dayNum, DAYS_DATA[dayNum]);
          setTimeout(() => {
            if (maps[dayNum]) maps[dayNum].invalidateSize();
          }, 100);
        }
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.05 });
  for (let i = 1; i <= 8; i++) {
    const el = document.getElementById(`day-${i}`);
    if (el) observer.observe(el);
  }
}

// ========== INIT ==========
window.addEventListener('DOMContentLoaded', () => {
  for (let i = 1; i <= 8; i++) {
    buildDayPage(i, DAYS_DATA[i], META[i]);
  }
  setupNavHighlight();
  setupLazyMaps();
  // Init day 1 immediately
  setTimeout(() => {
    initMap(1, DAYS_DATA[1]);
    drawProfile(1, DAYS_DATA[1]);
    buildFrieze(1, DAYS_DATA[1]);
    if (maps[1]) maps[1].invalidateSize();
  }, 200);
});
</script>
