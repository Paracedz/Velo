<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadbook Vélo — Provence → Bretagne — Mai 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --gold: #D4A93C;
  --gold-pale: #EDD98A;
  --gold-dark: #9A7620;
  --ink: #0D0D10;
  --ink2: #16161E;
  --ink3: #1E1E28;
  --border: rgba(212,169,60,0.18);
  --text: #E8E4DA;
  --muted: #7A7468;
  --green: #5BAD8A;
  --red: #D05A3B;
  --max-w: 820px;
  --nav-h: 48px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #0a0a0d; scroll-behavior: smooth; }
body { font-family: 'Lora', Georgia, serif; color: var(--text); padding-bottom: 60px; }

/* ══════════════════════════════════════════
   NAV  — scrollable on mobile
══════════════════════════════════════════ */
#sticky-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  display: flex; align-items: center; gap: 2px;
  background: rgba(13,13,16,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 12px; height: var(--nav-h);
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#sticky-nav::-webkit-scrollbar { display: none; }
.nav-pill {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); background: none; border: none; cursor: pointer;
  padding: 6px 11px; border-radius: 3px; transition: all .18s;
  white-space: nowrap; flex-shrink: 0;
}
.nav-pill:hover { color: var(--gold); }
.nav-pill.active { color: var(--ink); background: var(--gold); }
.nav-sep { color: var(--border); font-size: 16px; line-height: 1; user-select: none; flex-shrink: 0; }

/* ══════════════════════════════════════════
   PAGE WRAPPER
   Desktop: centered A4-ish card
   Mobile: full-width, no card shadow
══════════════════════════════════════════ */
.page {
  width: min(var(--max-w), 100%);
  margin: calc(var(--nav-h) + 16px) auto 0;
  background: var(--ink);
  position: relative;
  display: flex; flex-direction: column;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 24px 64px rgba(0,0,0,.65);
}
.page + .page { margin-top: 20px; }

/* Left gold rule */
.page::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--gold), var(--gold-dark)); z-index: 10;
}

@media (max-width: 600px) {
  .page {
    margin-top: calc(var(--nav-h) + 8px);
    border-left: none; border-right: none;
    box-shadow: none;
  }
  .page::before { width: 3px; }
}

/* ══════════════════════════════════════════
   COVER
══════════════════════════════════════════ */
#cover {
  min-height: min(100svh, 700px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px; gap: 0;
  overflow: hidden;
}
#cover-canvas { position: absolute; inset: 0; width: 100%; height: 100%; opacity: .07; pointer-events: none; }
.cover-top-rule    { position: absolute; top: 0;    left: 0; right: 0;   height: 4px; background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-pale)); }
.cover-bot-rule    { position: absolute; bottom: 0; left: 0; right: 0;   height: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-dark)); }
.cover-left-rule   { position: absolute; top: 0; bottom: 0; left: 0;     width: 4px;  background: linear-gradient(180deg, var(--gold), var(--gold-dark)); }
.cover-right-rule  { position: absolute; top: 0; bottom: 0; right: 0;    width: 4px;  background: linear-gradient(180deg, var(--gold-dark), var(--gold)); }

.cover-eyebrow {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
  font-size: clamp(10px, 2.5vw, 12px); letter-spacing: .4em; color: var(--gold);
  text-transform: uppercase; margin-bottom: 20px;
  opacity: 0; animation: fadeUp .8s .2s ease forwards;
}
.cover-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
  font-size: clamp(52px, 14vw, 108px); line-height: .88; text-align: center; color: var(--text);
  opacity: 0; animation: fadeUp .9s .4s ease forwards;
}
.cover-title em { color: var(--gold); font-style: normal; }
.cover-subtitle {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
  font-size: clamp(12px, 3.5vw, 18px); letter-spacing: .25em; color: var(--muted);
  margin-top: 18px; text-transform: uppercase; text-align: center;
  opacity: 0; animation: fadeUp .9s .6s ease forwards;
}
.cover-divider {
  width: 60px; height: 1px; background: var(--gold); margin: 28px 0;
  opacity: 0; animation: fadeUp .9s .7s ease forwards;
}

/* Cover stats grid — 2×2 on mobile, 4×1 on desktop */
.cover-stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--border);
  opacity: 0; animation: fadeUp .9s .85s ease forwards;
  width: 100%; max-width: 560px;
}
.cstat {
  padding: clamp(12px,3vw,20px) clamp(12px,4vw,32px); text-align: center;
  border-right: 1px solid var(--border);
}
.cstat:last-child { border-right: none; }
.cstat-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: clamp(20px, 5vw, 36px); color: var(--gold); display: block; line-height: 1;
}
.cstat-lbl {
  font-family: 'Barlow Condensed', sans-serif; font-size: clamp(8px,2vw,10px);
  letter-spacing: .15em; color: var(--muted); text-transform: uppercase;
  display: block; margin-top: 3px;
}
@media (max-width: 480px) {
  .cover-stats { grid-template-columns: repeat(2, 1fr); }
  .cstat:nth-child(2) { border-right: none; }
  .cstat:nth-child(3) { border-top: 1px solid var(--border); }
  .cstat:nth-child(4) { border-top: 1px solid var(--border); border-right: none; }
}

/* Cover days row — horizontal scroll on mobile */
.cover-days-row {
  display: flex; gap: 0; margin-top: 28px; border: 1px solid var(--border);
  opacity: 0; animation: fadeUp .9s 1s ease forwards;
  overflow-x: auto; width: 100%; max-width: 560px;
  scrollbar-width: none;
}
.cover-days-row::-webkit-scrollbar { display: none; }
.cday {
  padding: 9px 10px; text-align: center; border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.cday:last-child { border-right: none; }
.cday-j    { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: var(--gold); }
.cday-km   { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--text); }
.cday-date { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; color: var(--muted); }

/* ══════════════════════════════════════════
   DAY HEADER
══════════════════════════════════════════ */
.day-header {
  background: var(--ink2);
  padding: clamp(14px,3vw,22px) clamp(16px,4vw,28px) clamp(12px,2.5vw,18px);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px; border-bottom: 1px solid var(--border); position: relative;
  flex-wrap: wrap;
}
.day-header::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-pale));
}
.day-num-row { display: flex; align-items: baseline; gap: 10px; }
.day-ghost-num {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
  font-size: clamp(44px, 10vw, 72px); line-height: 1; color: rgba(212,169,60,.1);
}
.day-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(9px, 2vw, 10px); letter-spacing: .28em; color: var(--gold);
  text-transform: uppercase; margin-bottom: 3px;
}
.day-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: clamp(16px, 4vw, 26px); line-height: 1.1; color: var(--text);
}
.day-terrain {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(9px, 2vw, 11px); letter-spacing: .1em; color: var(--muted);
  margin-top: 4px; text-transform: uppercase;
}
.day-stats { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
.stat-box {
  background: var(--ink3); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 14px; text-align: center; min-width: 64px;
}
.stat-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: clamp(18px, 4vw, 24px); color: var(--gold); display: block; line-height: 1;
}
.stat-unit { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--text); display: block; }
.stat-lbl {
  font-family: 'Barlow Condensed', sans-serif; font-size: 8px;
  letter-spacing: .12em; color: var(--muted); text-transform: uppercase; display: block; margin-top: 2px;
}
@media (max-width: 480px) {
  .day-stats { width: 100%; justify-content: space-between; }
  .stat-box { flex: 1; }
}

/* ══════════════════════════════════════════
   DAY BODY — map + desc
   Side by side ≥ 600px, stacked below
══════════════════════════════════════════ */
.day-body {
  display: grid; grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border);
}
.day-map-wrap { position: relative; border-right: 1px solid var(--border); background: #0d1117; }
.day-map { width: 100%; height: clamp(220px, 40vw, 320px); }
.day-desc-wrap {
  padding: clamp(16px,3vw,24px) clamp(14px,3vw,26px);
  background: var(--ink3); display: flex; flex-direction: column;
}
@media (max-width: 600px) {
  .day-body { grid-template-columns: 1fr; }
  .day-map-wrap { border-right: none; border-bottom: 1px solid var(--border); }
  .day-map { height: 240px; }
}

/* ── Section eyebrow ── */
.section-eyebrow {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 9px; letter-spacing: .32em; color: var(--gold);
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Description ── */
.day-desc-text {
  font-size: clamp(12px, 2.8vw, 13.5px); line-height: 1.85;
  color: rgba(232,228,218,.88); font-style: italic; flex: 1;
}

/* ══════════════════════════════════════════
   PROFILE
══════════════════════════════════════════ */
.day-profile-wrap {
  padding: clamp(10px,2vw,12px) clamp(14px,3vw,24px) 6px;
  background: var(--ink2); border-bottom: 1px solid var(--border);
}
canvas.profile-cv { width: 100%; height: clamp(90px, 18vw, 120px); display: block; }

/* ══════════════════════════════════════════
   FRIEZE + WEATHER
══════════════════════════════════════════ */
.day-frieze-wrap {
  padding: clamp(10px,2vw,12px) clamp(14px,3vw,24px) clamp(14px,3vw,16px);
  background: var(--ink); flex: 1;
}
.frieze-svg-wrap { width: 100%; overflow: visible; }

/* Weather row — horizontal scroll on very small screens */
.weather-row {
  display: flex; gap: 8px; margin-top: 10px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.weather-row::-webkit-scrollbar { display: none; }
.weather-chip {
  background: var(--ink3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  flex: 1; min-width: 100px;
}
.weather-chip.loading { opacity: .4; }
.wc-time {
  font-family: 'Barlow Condensed', sans-serif; font-size: 9px;
  letter-spacing: .2em; color: var(--gold); text-transform: uppercase;
}
.wc-icon { font-size: clamp(18px, 5vw, 22px); line-height: 1; }
.wc-temp {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: clamp(17px, 4vw, 20px); color: var(--text); line-height: 1;
}
.wc-desc {
  font-family: 'Barlow Condensed', sans-serif; font-size: clamp(9px,2vw,10px);
  color: var(--muted); text-align: center;
}
.wc-detail {
  font-family: 'Barlow Condensed', sans-serif; font-size: 9px;
  color: var(--muted); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center;
}
.wc-wind { display: flex; align-items: center; gap: 3px; }
.wc-precip::before { content: '🌧 '; }

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
.day-footer {
  background: var(--ink2); border-top: 1px solid var(--border);
  padding: 6px clamp(14px,3vw,24px);
  display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
}
.day-footer span {
  font-family: 'Barlow Condensed', sans-serif; font-size: 8px;
  letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
}
@media (max-width: 480px) {
  .day-footer .day-footer-right { display: none; }
}

/* ══════════════════════════════════════════
   LEAFLET
══════════════════════════════════════════ */
.leaflet-tile-pane { filter: brightness(.75) saturate(.65) hue-rotate(10deg); }
.leaflet-control-zoom {
  border: 1px solid var(--border) !important; border-radius: 4px !important; overflow: hidden;
}
.leaflet-control-zoom a {
  background: rgba(22,22,30,0.93) !important; color: var(--gold) !important;
  border-bottom: 1px solid var(--border) !important;
  font-size: 16px !important; line-height: 28px !important;
  width: 28px !important; height: 28px !important;
  backdrop-filter: blur(6px); transition: background .15s;
}
.leaflet-control-zoom a:hover { background: rgba(212,169,60,0.18) !important; color: var(--gold-pale) !important; }
.leaflet-control-zoom-out { border-bottom: none !important; }

/* ══════════════════════════════════════════
   ANIMATIONS + SCROLLBAR
══════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

/* ══════════════════════════════════════════
   MOBILE-FIRST IMPROVEMENTS  ≤ 640px
══════════════════════════════════════════ */
@media (max-width: 640px) {

  /* Cover: tighter layout, bigger hit area */
  #cover { padding: 32px 16px 56px; }
  .cover-title { font-size: clamp(46px, 15vw, 72px); line-height: .88; }
  .cover-divider { margin: 20px 0; }
  .cover-stats { max-width: 100%; }
  .cstat { padding: 14px 12px; }
  .cstat-val { font-size: 22px; }
  .cover-days-row { max-width: 100%; }

  /* Sticky nav: slightly taller touch targets */
  #sticky-nav { height: 52px; padding: 0 10px; gap: 0; }
  .nav-pill { padding: 8px 9px; font-size: 10px; letter-spacing: .06em; }
  .nav-sep { display: none; }

  /* Page: edge-to-edge, no card chrome */
  .page {
    border-radius: 0;
    border-left: none; border-right: none;
    box-shadow: none;
  }
  .page + .page { margin-top: 12px; }

  /* Day header: stack stats below title */
  .day-header { flex-direction: column; padding: 18px 16px 14px; gap: 14px; }
  .day-ghost-num { font-size: 52px; }
  .day-title { font-size: clamp(15px, 5vw, 20px); }
  .day-stats { width: 100%; }
  .stat-box { flex: 1; padding: 8px 8px; min-width: 0; }
  .stat-val { font-size: 20px; }
  .stat-unit { font-size: 10px; }
  .stat-lbl { font-size: 8px; }

  /* Map: full width, taller on mobile for readability */
  .day-body { grid-template-columns: 1fr; }
  .day-map-wrap { border-right: none; border-bottom: 1px solid var(--border); }
  .day-map { height: 260px; }

  /* Description: more breathing room */
  .day-desc-wrap { padding: 18px 16px; }
  .day-desc-text { font-size: 13px; line-height: 1.75; }

  /* Profile: slightly shorter */
  canvas.profile-cv { height: 100px; }
  .day-profile-wrap { padding: 10px 12px 4px; }

  /* Frieze: smaller padding */
  .day-frieze-wrap { padding: 10px 12px 14px; }

  /* Weather: chips fill full width */
  .weather-row { gap: 6px; flex-wrap: nowrap; }
  .weather-chip { min-width: 0; flex: 1; padding: 8px 6px; gap: 2px; border-radius: 6px; }
  .wc-time { font-size: 8px; letter-spacing: .1em; }
  .wc-icon { font-size: 18px; }
  .wc-temp { font-size: 16px; }
  .wc-desc { font-size: 8.5px; }
  .wc-detail { font-size: 8px; gap: 4px; flex-direction: column; align-items: center; }

  /* Footer: single line */
  .day-footer { padding: 5px 12px; }
  .day-footer .day-footer-right { display: none; }
}

/* ── Very small phones ≤ 380px ─────────────────────────────── */
@media (max-width: 380px) {
  .cover-title { font-size: 42px; }
  .nav-pill { padding: 8px 6px; font-size: 9px; }
  .day-map { height: 220px; }
  .wc-icon { font-size: 16px; }
  .wc-temp { font-size: 14px; }
  .cstat-val { font-size: 18px; }
}

/* ── Touch-friendly: remove hover-only states on touch devices ── */
@media (hover: none) {
  .nav-pill:hover { color: var(--muted); background: none; }
  .nav-pill.active { color: var(--ink); background: var(--gold); }
}

/* ── Smooth scroll padding so sticky nav doesn't overlap ── */
:target { scroll-margin-top: calc(var(--nav-h) + 8px); }

</style>
</head>
<body>

<!-- NAV -->
<nav id="sticky-nav">
  <button class="nav-pill active" onclick="scrollTo2('cover')">Couverture</button>
  <span class="nav-sep">·</span>
  <button class="nav-pill" onclick="scrollTo2('day-1')">J1</button>
  <button class="nav-pill" onclick="scrollTo2('day-2')">J2</button>
  <button class="nav-pill" onclick="scrollTo2('day-3')">J3</button>
  <button class="nav-pill" onclick="scrollTo2('day-4')">J4</button>
  <button class="nav-pill" onclick="scrollTo2('day-5')">J5</button>
  <button class="nav-pill" onclick="scrollTo2('day-6')">J6</button>
  <button class="nav-pill" onclick="scrollTo2('day-7')">J7</button>
  <button class="nav-pill" onclick="scrollTo2('day-8')">J8</button>
</nav>

<!-- COVER PAGE -->
<div class="page" id="cover">
  <div class="cover-top-rule"></div>
  <div class="cover-bot-rule"></div>
  <div class="cover-left-rule"></div>
  <div class="cover-right-rule"></div>
  <canvas id="cover-canvas"></canvas>

  <div class="cover-eyebrow">Roadbook Vélo · Mai 2026</div>
  <div class="cover-title">De la<br><em>Provence</em><br>à la <em>Bretagne</em></div>
  <div class="cover-subtitle">8 Étapes · 1 317 km · 8 → 15 Mai 2026</div>
  <div class="cover-divider"></div>

  <div class="cover-stats">
    <div class="cstat"><span class="cstat-val">8</span><span class="cstat-lbl">Étapes</span></div>
    <div class="cstat"><span class="cstat-val">1 317</span><span class="cstat-lbl">Kilomètres</span></div>
    <div class="cstat"><span class="cstat-val">3 236</span><span class="cstat-lbl">D+ total (m)</span></div>
    <div class="cstat"><span class="cstat-val">Provence</span><span class="cstat-lbl">→ Bretagne</span></div>
  </div>

  <div class="cover-days-row" id="cover-days-row"></div>
</div>

<!-- DAY PAGES (injected by JS) -->
<div id="pages-container"></div>

<script>
// ══════════════════════════════════════
//  DATA (GPX + META)

<script>
// ══════════════════════════════════════
//  WEATHER CODES → emoji + label
// ══════════════════════════════════════
function wmoIcon(code, isDay=true) {
  const c = {
    0:['☀️','Soleil'], 1:['🌤','Peu nuageux'], 2:['⛅','Nuageux'], 3:['☁️','Couvert'],
    45:['🌫','Brouillard'], 48:['🌫','Brouillard givrant'],
    51:['🌦','Bruine légère'], 53:['🌦','Bruine'], 55:['🌧','Bruine forte'],
    61:['🌧','Pluie légère'], 63:['🌧','Pluie'], 65:['🌧','Pluie forte'],
    71:['🌨','Neige légère'], 73:['🌨','Neige'], 75:['❄️','Neige forte'],
    80:['🌦','Averses'], 81:['🌦','Averses mod.'], 82:['⛈','Fortes averses'],
    95:['⛈','Orage'], 96:['⛈','Orage grêle'], 99:['⛈','Orage violent'],
  };
  return c[code] || ['❓','Inconnu'];
}

// ══════════════════════════════════════
//  FETCH WEATHER for one day
//  Uses forecast_days=16 so all 8 days
//  are reachable regardless of start_date limits.
//  dayOffset = days from today to the stage date.
// ══════════════════════════════════════
function dayOffset(dateISO) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateISO + 'T00:00:00');
  return Math.round((target - today) / 86400000);
}

function degToCompass(deg) {
  if (deg == null) return '';
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(deg / 45) % 8];
}

function degToArrow(deg) {
  if (deg == null) return '';
  // Arrow points in the direction the wind blows TO (meteorological: from 180° flip)
  const angle = (deg + 180) % 360;
  return `<svg width="14" height="14" viewBox="0 0 14 14" style="display:inline-block;vertical-align:middle;transform:rotate(${angle}deg)"><path d="M7 1 L10 10 L7 8 L4 10 Z" fill="currentColor"/></svg>`;
}

async function fetchDayWeather(dayNum) {
  const d = DAYS[dayNum];
  const { start, mid, end } = d.weather_pts;
  const dateISO = META[dayNum].dateISO;
  const offset = dayOffset(dateISO);

  const points = [
    { label:'Matin 9h',  ...start, hour: 9  },
    { label:'Midi',       ...mid,   hour: 12 },
    { label:'Soir 19h',  ...end,   hour: 19 },
  ];

  const results = await Promise.all(points.map(async (pt) => {
    // hourly index within a forecast_days=16 response
    const idx = offset * 24 + pt.hour;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${pt.lat}&longitude=${pt.lon}`
      + `&hourly=temperature_2m,precipitation_probability,weathercode,windspeed_10m,winddirection_10m`
      + `&forecast_days=16&timezone=Europe%2FParis`;
    try {
      const res = await fetch(url);
      const json = await res.json();
      const h = json.hourly;
      if (!h || idx >= h.temperature_2m.length) return { label: pt.label, error: true };
      return {
        label: pt.label,
        temp: Math.round(h.temperature_2m[idx]),
        code: h.weathercode[idx],
        precip: h.precipitation_probability[idx],
        wind: Math.round(h.windspeed_10m[idx]),
        winddir: h.winddirection_10m[idx],
      };
    } catch(e) {
      return { label: pt.label, error: true };
    }
  }));
  return results;
}

// ══════════════════════════════════════
//  PROFILE CANVAS
// ══════════════════════════════════════
function drawProfile(canvasEl, profile, waypoints, totalKm) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvasEl.offsetWidth, H = canvasEl.offsetHeight;
  canvasEl.width = W * dpr; canvasEl.height = H * dpr;
  const ctx = canvasEl.getContext('2d');
  ctx.scale(dpr, dpr);

  const PL = 38, PR = 10, PT = 10, PB = 22;
  const GW = W - PL - PR, GH = H - PT - PB;

  const eles = profile.map(p => p.ele);
  const minE = Math.min(...eles), maxE = Math.max(...eles);
  const eRange = Math.max(maxE - minE, 10);

  function xOf(km) { return PL + (km / totalKm) * GW; }
  function yOf(e)  { return PT + GH - ((e - minE) / eRange) * GH; }

  // ── Background ──
  ctx.fillStyle = '#0D0D10';
  ctx.fillRect(0, 0, W, H);

  // ── Grid ──
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PT + (i / 4) * GH;
    ctx.beginPath(); ctx.moveTo(PL, y); ctx.lineTo(W - PR, y); ctx.stroke();
    const ev = Math.round(maxE - (i / 4) * eRange);
    ctx.fillStyle = 'rgba(122,116,104,.6)';
    ctx.font = `9px 'Barlow Condensed', sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(ev + 'm', PL - 3, y + 3);
  }

  // ── Fill gradient ──
  const grad = ctx.createLinearGradient(0, PT, 0, PT + GH);
  grad.addColorStop(0, 'rgba(212,169,60,.45)');
  grad.addColorStop(0.6, 'rgba(212,169,60,.12)');
  grad.addColorStop(1, 'rgba(212,169,60,.02)');

  ctx.beginPath();
  ctx.moveTo(xOf(profile[0].km), yOf(profile[0].ele));
  for (let i = 1; i < profile.length; i++) {
    ctx.lineTo(xOf(profile[i].km), yOf(profile[i].ele));
  }
  ctx.lineTo(xOf(profile[profile.length-1].km), PT + GH);
  ctx.lineTo(PL, PT + GH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // ── Line ──
  ctx.beginPath();
  ctx.moveTo(xOf(profile[0].km), yOf(profile[0].ele));
  for (let i = 1; i < profile.length; i++) {
    ctx.lineTo(xOf(profile[i].km), yOf(profile[i].ele));
  }
  ctx.strokeStyle = '#D4A93C';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── Waypoint ticks & labels on profile ──
  for (const wp of waypoints) {
    const x = xOf(wp.km);
    ctx.strokeStyle = 'rgba(212,169,60,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(x, yOf(wp.ele)); ctx.lineTo(x, PT + GH); ctx.stroke();
    ctx.setLineDash([]);

    // Dot on line
    ctx.beginPath();
    ctx.arc(x, yOf(wp.ele), 3, 0, Math.PI * 2);
    ctx.fillStyle = '#D4A93C';
    ctx.fill();

    // km label below x axis
    ctx.fillStyle = 'rgba(122,116,104,.8)';
    ctx.font = `8px 'Barlow Condensed', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(wp.km + ' km', x, H - 4);
  }

  // ── X axis base ──
  ctx.strokeStyle = 'rgba(212,169,60,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PL, PT + GH); ctx.lineTo(W - PR, PT + GH); ctx.stroke();
}

// ══════════════════════════════════════
//  FRIEZE SVG  (with waypoint names)
// ══════════════════════════════════════
function buildFrieze(container, waypoints, totalKm) {
  const W = container.offsetWidth || 720;
  const H = 68;
  const PAD = 12;
  const LINE_Y = 30;
  const AVAIL = W - 2 * PAD;

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block;width:100%;">`;

  // Gradient line
  svg += `<defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A7620"/>
      <stop offset="50%" stop-color="#D4A93C"/>
      <stop offset="100%" stop-color="#EDD98A"/>
    </linearGradient>
  </defs>`;
  svg += `<line x1="${PAD}" y1="${LINE_Y+1}" x2="${W-PAD}" y2="${LINE_Y+1}" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round"/>`;

  waypoints.forEach((wp, idx) => {
    const pct = wp.km / totalKm;
    const x = PAD + pct * AVAIL;
    const isStart = idx === 0;
    const isEnd = idx === waypoints.length - 1;
    const dotColor = isStart ? '#5BAD8A' : isEnd ? '#D05A3B' : '#D4A93C';
    const dotBg = isStart ? '#5BAD8A' : isEnd ? '#D05A3B' : '#16161E';

    // Tick
    svg += `<line x1="${x}" y1="${LINE_Y-12}" x2="${x}" y2="${LINE_Y+2}" stroke="${dotColor}" stroke-width="1.2"/>`;
    // Dot
    svg += `<circle cx="${x}" cy="${LINE_Y-12}" r="4.5" fill="${dotBg}" stroke="${dotColor}" stroke-width="1.5"/>`;
    // KM above dot
    svg += `<text x="${x}" y="${LINE_Y-19}" text-anchor="middle" font-family="'Barlow Condensed', sans-serif" font-size="8" font-weight="600" fill="#D4A93C">${wp.km}km</text>`;
    // Name below line
    const name = wp.name.length > 16 ? wp.name.slice(0,15) + '…' : wp.name;
    svg += `<text x="${x}" y="${LINE_Y+14}" text-anchor="middle" font-family="'Barlow Condensed', sans-serif" font-size="9" fill="#E8E4DA">${name}</text>`;
    if (wp.ele !== undefined) {
      svg += `<text x="${x}" y="${LINE_Y+24}" text-anchor="middle" font-family="'Barlow Condensed', sans-serif" font-size="7.5" fill="#7A7468">${wp.ele}m</text>`;
    }
  });

  svg += `</svg>`;
  container.innerHTML = svg;
}

// ══════════════════════════════════════
//  WEATHER CHIP HTML
// ══════════════════════════════════════
function renderWeatherChip(w) {
  if (w.error) {
    return `<div class="weather-chip">
      <div class="wc-time">${w.label}</div>
      <div class="wc-icon">—</div>
      <div class="wc-desc">Indisponible</div>
    </div>`;
  }
  const [icon, desc] = wmoIcon(w.code);
  const compass = degToCompass(w.winddir);
  const arrow   = degToArrow(w.winddir);
  return `<div class="weather-chip">
    <div class="wc-time">${w.label}</div>
    <div class="wc-icon">${icon}</div>
    <div class="wc-temp">${w.temp}°C</div>
    <div class="wc-desc">${desc}</div>
    <div class="wc-detail">
      <span class="wc-wind">${arrow} ${w.wind} km/h ${compass}</span>
      <span class="wc-precip">${w.precip}%</span>
    </div>
  </div>`;
}

// ══════════════════════════════════════
//  MAP
// ══════════════════════════════════════
const MAPS = {};
function initMap(dayNum) {
  if (MAPS[dayNum]) return;
  const track = DAYS[dayNum].track;
  const latlngs = track.map(p => [p[0], p[1]]);
  const mapEl = document.getElementById(`map-${dayNum}`);
  if (!mapEl) return;

  const map = L.map(mapEl, {
    zoomControl: true, attributionControl: false,
    scrollWheelZoom: false, dragging: true, touchZoom: true,
  });

  // Style the default zoom control to match dark theme
  map.zoomControl.setPosition('topright');

  // OSM standard tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // Track polyline — glow effect via two lines
  L.polyline(latlngs, { color: 'rgba(180,130,20,0.5)', weight: 8, opacity: 1 }).addTo(map);
  L.polyline(latlngs, { color: '#D4A93C', weight: 3, opacity: 1 }).addTo(map);

  // Start / End markers
  const startIcon = L.divIcon({ className:'', html:`<div style="width:12px;height:12px;border-radius:50%;background:#5BAD8A;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,.6)"></div>`, iconSize:[12,12], iconAnchor:[6,6] });
  const endIcon   = L.divIcon({ className:'', html:`<div style="width:12px;height:12px;border-radius:50%;background:#D05A3B;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,.6)"></div>`, iconSize:[12,12], iconAnchor:[6,6] });

  L.marker(latlngs[0], {icon: startIcon}).addTo(map);
  L.marker(latlngs[latlngs.length-1], {icon: endIcon}).addTo(map);

  // Waypoint markers (small)
  for (const wp of DAYS[dayNum].waypoints) {
    // no marker on map, keep it clean
  }

  const poly = L.polyline(latlngs);
  map.fitBounds(poly.getBounds(), { padding: [16, 16] });
  MAPS[dayNum] = map;
}

// ══════════════════════════════════════
//  COVER CANVAS (animated route sketch)
// ══════════════════════════════════════
function animateCoverCanvas() {
  const canvas = document.getElementById('cover-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * (window.devicePixelRatio||1);
  canvas.height = H * (window.devicePixelRatio||1);
  ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);

  // Collect all track points, normalised to the canvas
  const allPts = [];
  for (let d = 1; d <= 8; d++) {
    const tr = DAYS[d].track;
    for (const p of tr) allPts.push(p);
  }
  const lats = allPts.map(p => p[0]), lons = allPts.map(p => p[1]);
  const la0 = Math.min(...lats), la1 = Math.max(...lats);
  const lo0 = Math.min(...lons), lo1 = Math.max(...lons);
  const PAD = 60;
  function proj(lat, lon) {
    const x = PAD + (lon - lo0) / (lo1 - lo0) * (W - 2*PAD);
    const y = PAD + (la1 - lat) / (la1 - la0) * (H - 2*PAD);
    return [x, y];
  }
  const dayColors = ['#D4A93C','#c9963a','#be8337','#b37035','#a85d32','#9d4a30','#92372d','#87242b'];
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  for (let d = 1; d <= 8; d++) {
    const pts = DAYS[d].track.map(p => proj(p[0], p[1]));
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.strokeStyle = dayColors[d-1];
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ══════════════════════════════════════
//  INTERSECTION OBSERVER (lazy init)
// ══════════════════════════════════════
function setupLazy() {
  const obs = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (!e.isIntersecting) continue;
      const id = e.target.id;
      if (id === 'cover') { animateCoverCanvas(); obs.unobserve(e.target); continue; }
      const dayNum = parseInt(id.replace('day-',''));
      if (!dayNum) continue;
      obs.unobserve(e.target);

      // Map
      setTimeout(() => { initMap(dayNum); }, 50);

      // Profile
      setTimeout(() => {
        const cv = document.getElementById(`profile-${dayNum}`);
        if (cv) drawProfile(cv, DAYS[dayNum].profile, DAYS[dayNum].waypoints, DAYS[dayNum].km);
      }, 80);

      // Frieze
      setTimeout(() => {
        const fz = document.getElementById(`frieze-${dayNum}`);
        if (fz) buildFrieze(fz, DAYS[dayNum].waypoints, DAYS[dayNum].km);
      }, 80);

      // Weather
      fetchDayWeather(dayNum).then(results => {
        const wr = document.getElementById(`weather-${dayNum}`);
        if (wr) wr.innerHTML = results.map(renderWeatherChip).join('');
      });
    }
  }, { threshold: 0.05 });

  document.querySelectorAll('.page').forEach(p => obs.observe(p));
}

// ══════════════════════════════════════
//  NAV HIGHLIGHT
// ══════════════════════════════════════
function setupNavHighlight() {
  const pills = document.querySelectorAll('.nav-pill');
  const nav   = document.getElementById('sticky-nav');

  function activatePill(idx) {
    pills.forEach((p, i) => p.classList.toggle('active', i === idx));
    // Auto-scroll the nav so the active pill is visible (mobile)
    const active = pills[idx];
    if (active && nav) {
      const navLeft = nav.scrollLeft;
      const navW    = nav.offsetWidth;
      const pLeft   = active.offsetLeft;
      const pW      = active.offsetWidth;
      if (pLeft < navLeft + 8) {
        nav.scrollTo({ left: pLeft - 12, behavior: 'smooth' });
      } else if (pLeft + pW > navLeft + navW - 8) {
        nav.scrollTo({ left: pLeft + pW - navW + 12, behavior: 'smooth' });
      }
    }
  }

  const obs = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting) {
        const id  = e.target.id;
        const idx = id === 'cover' ? 0 : parseInt(id.replace('day-',''));
        if (!isNaN(idx)) activatePill(idx);
      }
    }
  }, { threshold: 0.35 });
  document.querySelectorAll('.page').forEach(p => obs.observe(p));
}

function scrollTo2(id) {
  document.getElementById(id)?.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildCoverDaysRow();
  for (let i = 1; i <= 8; i++) buildDayPage(i);
  setupLazy();
  setupNavHighlight();

  // Immediately init cover canvas
  animateCoverCanvas();
});
